services:

  mysql:
    image: mysql:8.4
    container_name: flowgraph-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flowgraph
      MYSQL_USER: flowgraphuser
      MYSQL_PASSWORD: flowgraphpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.22
    container_name: flowgraph-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  backend:
    build: .
    container_name: flowgraph-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker

volumes:
  mysql_data:
  neo4j_data: